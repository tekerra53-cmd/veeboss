<header class="fixed inset-x-0 top-0 z-50 px-3 pt-[max(0.75rem,env(safe-area-inset-top))] sm:px-4 md:px-8 md:pt-6">
  <div class="mx-auto w-full max-w-7xl">
    <div class="relative overflow-hidden rounded-2xl border border-white/25 bg-white/10 px-4 py-3 shadow-[0_0_42px_rgba(255,255,255,0.22)] backdrop-blur-xl supports-[backdrop-filter]:bg-white/8 sm:px-5 md:rounded-full md:px-6">
      <div class="absolute inset-0 bg-gradient-to-r from-fuchsia-300/15 via-white/5 to-cyan-300/15"></div>
      <div class="relative flex items-center justify-between gap-4">
        <a href="{{ url_for('home') }}" class="font-display text-xs tracking-[0.16em] text-white sm:text-sm sm:tracking-[0.24em]">VEEBOSS STITCHES</a>
        <button
          id="mobile-menu-toggle"
          type="button"
          aria-label="Toggle navigation menu"
          aria-expanded="false"
          class="rounded-full border border-white/25 px-3 py-1 text-xs uppercase tracking-[0.2em] text-white transition hover:border-white/60 md:hidden"
        >
          Menu
        </button>
        <nav class="hidden items-center gap-5 text-xs uppercase tracking-[0.2em] md:flex">
          <a href="{{ url_for('home') }}#home" data-section-link="home" class="nav-link transition text-white/78 hover:text-white border-b border-transparent">Home</a>
          <a href="{{ url_for('home') }}#services" data-section-link="services" class="nav-link transition text-white/78 hover:text-white border-b border-transparent">Services</a>
          <a href="{{ url_for('home') }}#about" data-section-link="about" class="nav-link transition text-white/78 hover:text-white border-b border-transparent">About</a>
          <a href="{{ url_for('home') }}#process" data-section-link="process" class="nav-link transition text-white/78 hover:text-white border-b border-transparent">Process</a>
          <a href="{{ url_for('home') }}#contact" data-section-link="contact" class="nav-link transition text-white/78 hover:text-white border-b border-transparent">Contact</a>
          <a href="{{ url_for('collections') }}" class="transition {{ 'text-white border-b border-white/70' if request.path == url_for('collections') else 'text-white/78 hover:text-white border-b border-transparent' }}">Archive</a>
          <a href="{{ url_for('admin') }}" class="transition {{ 'text-white border-b border-white/70' if request.path == url_for('admin') else 'text-white/78 hover:text-white border-b border-transparent' }}">login</a>
        </nav>
      </div>
    </div>
    <nav id="mobile-nav" class="hidden mt-3 rounded-2xl border border-white/15 bg-black/70 p-4 text-xs uppercase tracking-[0.2em] text-white shadow-[0_0_30px_rgba(0,0,0,0.4)] md:hidden">
      <div class="flex flex-col gap-2">
        <a href="{{ url_for('home') }}#home" data-section-link="home" class="nav-link transition text-white/78 hover:text-white border-b border-transparent pb-2">Home</a>
        <a href="{{ url_for('home') }}#services" data-section-link="services" class="nav-link transition text-white/78 hover:text-white border-b border-transparent pb-2">Services</a>
        <a href="{{ url_for('home') }}#about" data-section-link="about" class="nav-link transition text-white/78 hover:text-white border-b border-transparent pb-2">About</a>
        <a href="{{ url_for('home') }}#process" data-section-link="process" class="nav-link transition text-white/78 hover:text-white border-b border-transparent pb-2">Process</a>
        <a href="{{ url_for('home') }}#contact" data-section-link="contact" class="nav-link transition text-white/78 hover:text-white border-b border-transparent pb-2">Contact</a>
        <a href="{{ url_for('collections') }}" class="transition text-white/78 hover:text-white border-b border-transparent pb-2">Archive</a>
        <a href="{{ url_for('admin') }}" class="transition text-white/78 hover:text-white border-b border-transparent pb-2">login</a>
      </div>
    </nav>
  </div>
</header>
